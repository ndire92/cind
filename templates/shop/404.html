<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable | Terra & Pure</title>
    
    <!-- Polices et Icones -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #557C55;
            --primary-dark: #3A5A40;
            --secondary-color: #A4C3B2;
            --bg-color: #FAF9F6;
            --text-color: #333333;
            --white: #FFFFFF;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: var(--text-color); height: 100vh; display: flex; flex-direction: column; }
        a { text-decoration: none; color: inherit; transition: 0.3s; }

        /* Header Minimal */
        header { padding: 20px; background: white; text-align: center; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: var(--primary-dark); }

        /* Container Principal */
        .error-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        .error-content { max-width: 600px; }

        .big-404 {
            font-family: 'Playfair Display', serif; font-size: 10rem; line-height: 1;
            color: rgba(85, 124, 85, 0.1); position: relative; z-index: 1; margin-bottom: -50px;
            user-select: none;
        }

        .illustration {
            font-size: 5rem; color: var(--primary-dark); margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        h1 { font-size: 2rem; color: var(--primary-dark); margin-bottom: 15px; font-weight: 600; }
        p { color: #666; margin-bottom: 30px; font-size: 1.1rem; line-height: 1.6; }

        .search-box {
            display: flex; max-width: 400px; margin: 0 auto 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); border-radius: 50px;
        }
        .search-box input {
            flex: 1; border: none; padding: 15px 25px; border-radius: 50px 0 0 50px; outline: none; font-family: 'Montserrat', sans-serif;
        }
        .search-box button {
            background: var(--primary-color); color: white; border: none; padding: 0 25px; border-radius: 0 50px 50px 0; cursor: pointer; font-size: 1.1rem;
        }
        .search-box button:hover { background: var(--primary-dark); }

        .btn {
            display: inline-block; padding: 12px 30px; border-radius: 50px; border: 2px solid var(--primary-color);
            color: var(--primary-color); font-weight: 600; transition: 0.3s;
        }
        .btn:hover { background: var(--primary-color); color: white; transform: translateY(-2px); }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }

        @media (max-width: 600px) {
            .big-404 { font-size: 7rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Terra <span>&</span> Pure</a>
    </header>

    <div class="error-container">
        <div class="error-content">
            <div class="big-404">404</div>
            <i class="fas fa-leaf illustration"></i>
            
            <h1>Oups ! Vous vous êtes égaré.</h1>
            <p>Il semble que la page que vous cherchez ait été cueillie ailleurs ou n'existe plus. Pas de panique, on vous ramène vers de la nature.</p>
            
            <div class="search-box">
                <input type="text" placeholder="Rechercher un produit...">
                <button><i class="fas fa-search"></i></button>
            </div>

            <a href="index.html" class="btn">Retour à l'accueil</a>
        </div>
    </div>

</body>
</html>
