{% extends "base.html" %}

{% block content %}
<div class="container text-center my-5" style="max-width: 600px;">
    <div class="card shadow border-0">
        <div class="card-body py-5">
            <!-- Icône de succès -->
            <div class="mb-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 5rem;"></i>
            </div>
            
            <h1 class="h3 mb-3">Paiement réussi !</h1>
            <p class="text-muted mb-4">
                Merci pour votre achat. Votre commande a été validée et sera traitée dans les plus brefs délais.
            </p>

            <p class="small text-muted">
                Vous recevrez un email de confirmation avec les détails de votre commande.
            </p>

            <hr class="my-4">

            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'products:shop' %}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Retour à la boutique
                </a>
                <a href="{% url 'products:profile' %}" class="btn btn-primary">
                    <i class="bi bi-person"></i> Voir mes commandes
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
