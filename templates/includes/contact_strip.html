<section class="contact-strip">
    <div class="contact-grid">
        <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-phone-alt"></i></div>
            <div>
                {% if settings.contact_phone %}
                    <a href="tel:{{ settings.contact_phone }}">{{ settings.contact_phone }}</a>
                {% endif %}
            </div>
        </div>
        <div class="contact-item">
            <div class="contact-icon"><i class="far fa-envelope"></i></div>
            <div>
                {% if settings.contact_email %}
                    <a href="mailto:{{ settings.contact_email }}">{{ settings.contact_email }}</a>
                {% endif %}
            </div>
        </div>
        <div class="contact-item">
            <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
            <div>
                {% if settings.addresse %}
                    <span>{{ settings.addresse }}</span>
                {% endif %}
            </div>
        </div>
    </div>
</section>

<style>
    .contact-strip { background-color: #014215; padding:80px 20px;
  margin:0 auto 60px auto;max-width:1200px;
  border-radius: var(--radius);}
    .contact-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; text-align: center; } }
    .contact-item { display: flex; align-items: center; gap: 25px; color: white; }
    @media (max-width: 768px) { .contact-item { flex-direction: column; gap: 15px; } }
    .contact-icon { width: 70px; height: 70px; background-color: rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #fd7e14; flex-shrink: 0; transition: all 0.3s ease; }
    .contact-item:hover .contact-icon { background-color: #fd7e14; color: white; transform: scale(1.1); }
    .contact-item div a, .contact-item div span { display: block; color: rgba(255, 255, 255, 0.9); text-decoration: none; font-size: 1rem; transition: color 0.3s ease; }
    .contact-item div a:hover { color: #fd7e14; }

</style>
