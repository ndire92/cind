{% extends "dashboard/base_dashboard.html" %}

{% block content %}
<div class="container py-5 text-center">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 500px;">
        <div class="card-body py-5">
            <i class="bi bi-exclamation-triangle text-danger fs-1"></i>
            <h3 class="mt-3">Confirmer la suppression</h3>
            <p class="text-muted">Voulez-vous vraiment supprimer la page <strong>{{ page.title }}</strong> ?</p>
            
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Oui, supprimer</button>
                <a href="{% url 'dashboard:static_page_list' %}" class="btn btn-outline-secondary ms-2">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
