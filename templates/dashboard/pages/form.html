{% extends "dashboard/base_dashboard.html" %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4">{% if form.instance.pk %}Modifier{% else %}Ajouter une page{% endif %}</h2>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Titre</label>
                    {{ form.title }}
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Slug (URL)</label>
                    {{ form.slug }}
                    <small class="text-muted">Ex: cgv, livraison, mentions-legales</small>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Contenu</label>
                    {{ form.content }}
                </div>

                <div class="text-end">
                    <a href="{% url 'dashboard:static_page_list' %}" class="btn btn-secondary">Annuler</a>
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
