{% extends "dashboard/base_dashboard.html" %}
{% block content %}
<div class="container mt-4">
    <h2>Confirmer la suppression</h2>
    <p>Es-tu sûr de vouloir supprimer la vidéo <strong>{{ video.title }}</strong> ?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Oui, supprimer</button>
        <a href="{% url 'dashboard:video_list' %}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
{% endblock %}
