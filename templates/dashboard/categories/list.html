{% extends "dashboard/base_dashboard.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Catégories</h2>
    <a href="{% url 'dashboard:category_add' %}" class="btn btn-primary">
        <i class="bi bi-plus-circle"></i> Ajouter une catégorie
    </a>
</div>

<div class="card shadow">
    <div class="card-body">
        <table class="table table-hover mb-0">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Description</th>
                    <th style="width: 150px;">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for cat in object_list %}
                <tr>
                    <td><strong>{{ cat.name }}</strong></td>
                    <td>{{ cat.description|truncatewords:10 }}</td>
                    <td>
                        <a href="{% url 'dashboard:category_edit' cat.slug %}" class="btn btn-sm btn-outline-info">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <a href="{% url 'dashboard:category_delete' cat.slug %}" class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center text-muted">Aucune catégorie créée.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
