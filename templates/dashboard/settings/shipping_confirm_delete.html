{% extends "dashboard/base_dashboard.html" %}

{% block content %}
<div class="card shadow p-4 mt-3" style="max-width: 600px;">
    <h4>Supprimer la zone</h4>
    <p>Êtes-vous sûr de vouloir supprimer la zone <strong>{{ zone.name }}</strong> ?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Oui, supprimer</button>
        <a href="{% url 'dashboard:shipping_zones' %}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
{% endblock %}
