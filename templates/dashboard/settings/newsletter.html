{% extends "dashboard/base_dashboard.html" %}

{% block content %}
<div class="container-fluid py-4">
    <h2 class="fw-bold mb-4"><i class="bi bi-envelope text-info me-2"></i>Section Newsletter</h2>
    
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Image de fond</label>
                    
                    {% if form.instance.newsletter_bg_image %}
                        <div class="d-flex align-items-center gap-3 mb-3 p-3 bg-light rounded border">
                            <img src="{{ form.instance.newsletter_bg_image.url }}" class="rounded" style="width: 120px; height: 80px; object-fit: cover;">
                            <div class="form-check">
                                <input type="checkbox" name="newsletter_bg_image-clear" id="newsletter-clear_id" class="form-check-input">
                                <label for="newsletter-clear_id" class="form-check-label text-danger fw-bold">Supprimer</label>
                            </div>
                        </div>
                    {% endif %}

                    <div class="image-upload-area">
                        <i class="bi bi-image fs-1 text-muted"></i>
                        <p class="mb-0 text-muted small">Image de fond pour la section</p>
                        <input type="file" name="newsletter_bg_image" accept="image/*">
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Titre</label>
                        <input type="text" name="newsletter_title" value="{{ form.newsletter_title.value|default:'' }}" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Texte d'accroche</label>
                        <textarea name="newsletter_text" rows="3" class="form-control">{{ form.newsletter_text.value|default:'' }}</textarea>
                    </div>
                </div>

                <div class="text-end mt-4">
                    <button type="submit" class="btn btn-info btn-lg px-5 text-white shadow-sm">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .image-upload-area { border: 2px dashed #ced4da; padding: 40px; text-align: center; border-radius: 8px; background-color: #f8f9fa; cursor: pointer; position: relative; overflow: hidden; }
    .image-upload-area:hover { border-color: #0dcaf0; background-color: #e8f6f8; }
    .image-upload-area input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
</style>
{% endblock %}
