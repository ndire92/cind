{% extends "dashboard/base_dashboard.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-5">
        <div class="card shadow-sm border-0 border-start border-5 border-danger">
            <div class="card-body text-center p-5">
                <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
                <h3 class="mt-3">Confirmer la suppression</h3>
                <p class="text-muted">
                    Êtes-vous sûr de vouloir supprimer l'article<br>
                    <strong>"{{ post.title }}"</strong> ?
                </p>
                <p class="small text-danger fw-bold">Cette action est irréversible.</p>

                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <a href="{% url 'dashboard:blog_posts' %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left me-2"></i> Annuler
                        </a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-2"></i> Oui, supprimer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
