<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Terra & Pure</title>
    
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- VARIABLES CSS --- */
        :root {
            --primary-color: #557C55;
            --primary-dark: #3A5A40;
            --secondary-color: #A4C3B2;
            --bg-light: #F4F7F6;
            --sidebar-width: 260px;
            --white: #FFFFFF;
            --text-main: #333333;
            --text-light: #777777;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #c0392b;
            --border-color: #e0e0e0;
        }

        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-light); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }

        /* --- SIDEBAR (Style Unifié) --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--primary-dark); /* Fond vert foncé */
            color: #ecf0f1;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
            margin-bottom: 20px;
            color: white;
        }
        .brand span { color: var(--secondary-color); }

        .sidebar ul { list-style: none; padding: 0; margin-top: 10px; }
        .sidebar li form { margin: 0; display: block; }

        /* Boutons de navigation */
        .nav-btn {
            width: 100%;
            text-align: left;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.7);
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: translateX(5px);
        }

        /* État Actif */
        .nav-btn.active {
            background-color: var(--primary-color); /* Vert plus clair */
            color: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: 600;
        }

        .nav-btn i { width: 20px; text-align: center; }

        .user-info {
            margin-top: auto; /* Pousse en bas */
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            text-align: center;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- TOPBAR (Corrigée) --- */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
            padding: 0 30px;
            height: 70px;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .topbar-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary-dark);
        }

        /* Dropdown Menu Utilisateur (CSS Pur) */
        .user-dropdown {
            position: relative;
            display: inline-block;
            cursor: pointer;
            padding: 5px 0;
        }

        .user-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 10px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .user-toggle:hover { background-color: #f9f9f9; }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--secondary-color);
            object-fit: cover;
        }

        .dropdown-menu-custom {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background-color: white;
            min-width: 180px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 8px 0;
            margin-top: 10px;
            border: 1px solid #eee;
            z-index: 2000;
            animation: slideDown 0.2s ease;
        }


        .dropdown-item {
            display: block;
            padding: 10px 20px;
            color: #333;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .dropdown-item:hover { background-color: #f0f0f0; color: var(--primary-color); }

        /* --- CONTENT AREA --- */
        .content-area { padding: 30px; flex: 1; }

        /* --- CARDS --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .stat-info h3 { font-size: 0.9rem; color: var(--text-light); margin-bottom: 5px; font-weight: 500; }
        .stat-info .value { font-size: 1.8rem; font-weight: 700; color: var(--primary-dark); }
        .stat-icon {
            width: 50px; height: 50px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }
        .bg-green { background: rgba(39, 174, 96, 0.1); color: var(--success); }
        .bg-blue { background: rgba(41, 128, 185, 0.1); color: #2980b9; }
        .bg-orange { background: rgba(243, 156, 18, 0.1); color: var(--warning); }
        .bg-red { background: rgba(192, 57, 43, 0.1); color: var(--danger); }

        /* --- SECTIONS & TABLES --- */
        .section-container { background: var(--white); border-radius: 12px; padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); margin-bottom: 30px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .section-title { font-size: 1.4rem; color: var(--primary-dark); font-family: 'Playfair Display', serif; }

        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: left; padding: 15px; border-bottom: 2px solid #eee; font-size: 0.85rem; color: var(--text-light); text-transform: uppercase; }
        .data-table td { padding: 15px; border-bottom: 1px solid #f9f9f9; font-size: 0.95rem; }
        
        /* Badges personnalisés (remplace Bootstrap) */
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-paid, .badge-success { background: #e8f5e9; color: var(--success); }
        .status-pending, .badge-warning { background: #fff3e0; color: var(--warning); }
        .status-shipped, .badge-primary { background: #e3f2fd; color: #2980b9; }
        .badge-danger { background: #fdecea; color: var(--danger); }

        /* Boutons personnalisés */
        .btn {
            display: inline-block; padding: 8px 16px; border-radius: 6px; font-size: 0.9rem; font-weight: 500; cursor: pointer; text-align: center; transition: 0.3s;
        }
        .btn-primary { background: var(--primary-color); color: white; border: none; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { border: 1px solid var(--border-color); background: white; color: var(--text-main); }
        .btn-outline:hover { border-color: var(--primary-color); color: var(--primary-color); }
        .btn-sm { padding: 4px 10px; font-size: 0.8rem; }
        .btn-outline-success { border: 1px solid var(--success); color: var(--success); background: transparent; }
        .btn-outline-success:hover { background: var(--success); color: white; }

        /* Chart Simulation */
        .chart-container { height: 200px; display: flex; align-items: flex-end; gap: 10px; padding-top: 20px; }
        .chart-bar { flex: 1; background: var(--secondary-color); border-radius: 4px 4px 0 0; position: relative; transition: height 0.5s; opacity: 0.7; }
        .chart-bar:hover { opacity: 1; background: var(--primary-color); }
        .chart-bar span { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: var(--text-light); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); transition: 0.3s; }
            .main-content { margin-left: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="brand"><i class="fas fa-leaf"></i> Cinedera</span></div>
        <ul>
            <li>
                <form action="{% url 'dashboard:overview' %}" method="get">
                    <button type="submit" class="nav-btn {% if request.resolver_match.url_name == 'overview' %}active{% endif %}">
                        <i class="fas fa-chart-line"></i> Vue d'ensemble
                    </button>
                </form>
            </li>
            <li>
                <form action="{% url 'dashboard:orders' %}" method="get">
                    <button type="submit" class="nav-btn {% if request.resolver_match.url_name == 'orders' %}active{% endif %}">
                        <i class="fas fa-shopping-bag"></i> Commandes
                    </button>
                </form>
            </li>
            <li>
                <form action="{% url 'dashboard:products' %}" method="get">
                    <button type="submit" class="nav-btn {% if request.resolver_match.url_name == 'products' %}active{% endif %}">
                        <i class="fas fa-box-open"></i> Produits
                    </button>
                </form>
            </li>
            <li>
                <form action="{% url 'dashboard:blog_posts' %}" method="get">
                    <button type="submit" class="nav-btn {% if request.resolver_match.url_name == 'blog_posts' %}active{% endif %}">
                        <i class="fas fa-pen-nib"></i> Blog
                    </button>
                </form>
            </li>
             <li>
                <form action="{% url 'dashboard:category_list' %}" method="get">
                    <button type="submit" class="nav-btn {% if request.resolver_match.url_name == 'category_list' %}active{% endif %}">
                        <i class="fas fa-list"></i> Catégories
                    </button>
                </form>
            </li>
            <li>
                <form action="{% url 'dashboard:accounting' %}" method="get">
                    <button type="submit" class="nav-btn {% if request.resolver_match.url_name == 'accounting' %}active{% endif %}">
                        <i class="fas fa-calculator"></i> Comptabilité
                    </button>
                </form>
            </li>
            <li>
                <form action="{% url 'dashboard:settings' %}" method="get">
                    <button type="submit" class="nav-btn {% if request.resolver_match.url_name == 'settings' %}active{% endif %}">
                        <i class="fas fa-cog"></i> Réglages
                    </button>
                </form>
            </li>
        </ul>
        <div class="user-info">Connecté en tant que <strong>{{ request.user.username }}</strong></div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        
        <!-- TOPBAR CORRIGÉE -->
        <header class="topbar">
            <div class="topbar-title">Tableau de bord</div>
            
            <!-- Dropdown Utilisateur (CSS Pur) -->
            <div class="user-dropdown" id="userDropdown">

                <div class="user-toggle">
                    <span>{{ request.user.username }}</span>

                </div>
                <ul class="dropdown-menu-custom">
                    <li><a href="{% url 'products:profile' %}" class="dropdown-item"><i class="fas fa-user"></i> Mon Profil</a></li>
                    <li><hr style="border: 0; border-top: 1px solid #eee; margin: 5px 0;"></li>
                    <li><a href="{% url 'products:logout' %}" class="dropdown-item" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> Déconnexion</a></li>
                </ul>
            </div>
        </header>

    <main class="main-content">
        <div class="danger-card">
            <div class="danger-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h2 class="danger-title">Confirmer la suppression</h2>
            <p class="danger-text">
                Êtes-vous sûr de vouloir supprimer l'article <strong>"{{ post.title }}"</strong> ?
                <br><br>
                <small style="color:#999;">Cette action est irréversible.</small>
            </p>
            
            <form method="post" style="margin-top: 30px;">
                {% csrf_token %}
                <a href="{% url 'dashboard:blog_posts' %}" class="btn-cancel">Annuler</a>
                <button type="submit" class="btn-danger">Oui, supprimer</button>
            </form>
        </div>
    </main>

</body>
</html>
