<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Zone | Terra & Pure</title>
    
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #557C55;
            --primary-dark: #3A5A40;
            --secondary-color: #A4C3B2;
            --bg-light: #F4F7F6;
            --sidebar-width: 260px;
            --white: #FFFFFF;
            --text-main: #333333;
            --text-light: #777777;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #c0392b;
            --border-color: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-light); color: var(--text-main); display: flex; min-height: 100vh; }

        /* --- SIDEBAR --- */
           /* --- SIDEBAR (Style Unifié) --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--primary-dark); /* Fond vert foncé */
            color: #ecf0f1;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
            margin-bottom: 20px;
            color: white;
        }
        .brand span { color: var(--secondary-color); }

        .sidebar ul { list-style: none; padding: 0; margin-top: 10px; }
        .sidebar li form { margin: 0; display: block; }
        .nav-btn {
            width: 100%; text-align: left; padding: 12px 15px; margin-bottom: 5px;
            background: transparent; border: none; color: #bdc3c7; font-family: inherit;
            font-size: 1rem; cursor: pointer; border-radius: 8px;
            display: flex; align-items: center; gap: 12px; transition: all 0.3s ease;
        }
        .nav-btn:hover { background-color: rgba(255, 255, 255, 0.1); color: #fff; transform: translateX(5px); }
        .nav-btn.active { background-color: #27ae60; color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-btn i { width: 20px; text-align: center; }

        .user-info { margin-top: auto; font-size: 0.9rem; color: #95a5a6; text-align: center; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width));
            display: flex; flex-direction: column; min-height: 100vh;
        }

   /* --- TOPBAR (Corrigée) --- */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
            padding: 0 30px;
            height: 70px;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .topbar-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary-dark);
        }

        /* Dropdown Menu Utilisateur (CSS Pur) */
        .user-dropdown {
            position: relative;
            display: inline-block;
            cursor: pointer;
            padding: 5px 0;
        }

        .user-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 10px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .user-toggle:hover { background-color: #f9f9f9; }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--secondary-color);
            object-fit: cover;
        }

        .dropdown-menu-custom {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background-color: white;
            min-width: 180px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 8px 0;
            margin-top: 10px;
            border: 1px solid #eee;
            z-index: 2000;
            animation: slideDown 0.2s ease;
        }


        .dropdown-item {
            display: block;
            padding: 10px 20px;
            color: #333;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .dropdown-item:hover { background-color: #f0f0f0; color: var(--primary-color); }

        /* Content Area */
        .content-area { padding: 30px; }

        /* --- FORM STYLE --- */
        .section-container {
            background: var(--white); border-radius: 12px; padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); animation: fadeIn 0.3s ease;
        }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .section-title { font-size: 1.4rem; color: var(--primary-dark); font-family: 'Playfair Display', serif; }

        .form-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 25px;
        }
        .form-group { margin-bottom: 5px; }
        .form-label {
            display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-main); font-size: 0.9rem;
        }
        .form-control {
            width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 0.95rem; background-color: #FAFAFA; transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
        }
        .form-control:focus {
            border-color: var(--primary-color); background-color: white; outline: none;
            box-shadow: 0 0 0 3px rgba(85, 124, 85, 0.1);
        }
        .full-width { grid-column: span 2; }

        .form-actions {
            margin-top: 30px; display: flex; gap: 15px; padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .btn-form {
            padding: 12px 30px; border-radius: 50px; font-weight: 600; cursor: pointer;
            border: none; font-family: 'Montserrat', sans-serif; transition: 0.3s;
            display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
        }
        .btn-save { background-color: var(--primary-color); color: white; }
        .btn-save:hover { background-color: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(85, 124, 85, 0.3); }
        .btn-cancel { background-color: #e2e8f0; color: var(--text-main); }
        .btn-cancel:hover { background-color: #cbd5e0; }
        
        .btn-text { background: none; color: var(--text-muted); padding: 0; font-weight: 400; text-decoration: none; font-size: 0.9rem; }
        .btn-text:hover { color: var(--primary-color); text-decoration: underline; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; width: 100%; }
            .form-container { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

       <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="brand"><i class="fas fa-leaf"></i> Cinedera</span></div>
        <ul>
            <li>
                <form action="{% url 'dashboard:overview' %}" method="get">
                    <button type="submit" class="nav-btn {% if request.resolver_match.url_name == 'overview' %}active{% endif %}">
                        <i class="fas fa-chart-line"></i> Vue d'ensemble
                    </button>
                </form>
            </li>
            <li>
                <form action="{% url 'dashboard:orders' %}" method="get">
                    <button type="submit" class="nav-btn {% if request.resolver_match.url_name == 'orders' %}active{% endif %}">
                        <i class="fas fa-shopping-bag"></i> Commandes
                    </button>
                </form>
            </li>
            <li>
                <form action="{% url 'dashboard:products' %}" method="get">
                    <button type="submit" class="nav-btn {% if request.resolver_match.url_name == 'products' %}active{% endif %}">
                        <i class="fas fa-box-open"></i> Produits
                    </button>
                </form>
            </li>
            <li>
                <form action="{% url 'dashboard:blog_posts' %}" method="get">
                    <button type="submit" class="nav-btn {% if request.resolver_match.url_name == 'blog_posts' %}active{% endif %}">
                        <i class="fas fa-pen-nib"></i> Blog
                    </button>
                </form>
            </li>
             <li>
                <form action="{% url 'dashboard:category_list' %}" method="get">
                    <button type="submit" class="nav-btn {% if request.resolver_match.url_name == 'category_list' %}active{% endif %}">
                        <i class="fas fa-list"></i> Catégories
                    </button>
                </form>
            </li>
            <li>
                <form action="{% url 'dashboard:accounting' %}" method="get">
                    <button type="submit" class="nav-btn {% if request.resolver_match.url_name == 'accounting' %}active{% endif %}">
                        <i class="fas fa-calculator"></i> Comptabilité
                    </button>
                </form>
            </li>
            <li>
                <form action="{% url 'dashboard:settings' %}" method="get">
                    <button type="submit" class="nav-btn {% if request.resolver_match.url_name == 'settings' %}active{% endif %}">
                        <i class="fas fa-cog"></i> Réglages
                    </button>
                </form>
            </li>
        </ul>
        <div class="user-info">Connecté en tant que <strong>{{ request.user.username }}</strong></div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        
        <!-- TOPBAR CORRIGÉE -->
        <header class="topbar">
            <div class="topbar-title">Tableau de bord</div>
            
            <!-- Dropdown Utilisateur (CSS Pur) -->
            <div class="user-dropdown" id="userDropdown">

                <div class="user-toggle">
                    <span>{{ request.user.username }}</span>

                </div>
                <ul class="dropdown-menu-custom">
                    <li><a href="{% url 'products:profile' %}" class="dropdown-item"><i class="fas fa-user"></i> Mon Profil</a></li>
                    <li><hr style="border: 0; border-top: 1px solid #eee; margin: 5px 0;"></li>
                    <li><a href="{% url 'products:logout' %}" class="dropdown-item" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> Déconnexion</a></li>
                </ul>
            </div>
        </header>

        <div class="content-area">
            
            <!-- Formulaire de Modification -->
            <div class="section-container">
                <div class="section-header">
                    <h2 class="section-title">✏️ Modifier la zone de livraison</h2>
                    <a href="{% url 'dashboard:shipping_zones' %}" class="btn-text">
                        <i class="fas fa-arrow-left"></i> Retour à la liste
                    </a>
                </div>

                <form method="post">
                    {% csrf_token %}
                    
                    <!-- Grille de formulaire -->
                    <div class="form-container">
                        
                        <!-- Champ : Nom de la zone -->
                        <div class="form-group">
                            <label class="form-label" for="id_name">Nom de la zone</label>
                            <input type="text" name="name" id="id_name" class="form-control" value="{{ zone.name }}" placeholder="Ex: Europe de l'Ouest">
                        </div>

                        <!-- Champ : Prix -->
                        <div class="form-group">
                            <label class="form-label" for="id_price">Frais de port HT (€)</label>
                            <input type="number" step="0.01" name="price" id="id_price" class="form-control" value="{{ zone.price }}" placeholder="0.00">
                        </div>

                        <!-- Champ : Codes Pays (Pleine largeur) -->
                        <div class="form-group full-width">
                            <label class="form-label" for="id_countries">Codes pays (ISO)</label>
                            <input type="text" name="countries" id="id_countries" class="form-control" value="{{ zone.countries }}" placeholder="Ex: FR, DE, BE, LU">
                            <small style="color: var(--text-light); font-size: 0.8rem; margin-top: 5px; display:block;">
                                Séparez les codes pays par une virgule (ex: FR, ES, IT).
                            </small>
                        </div>
                    </div>

                    <!-- Boutons d'action -->
                    <div class="form-actions">
                        <button type="submit" class="btn-form btn-save">
                            <i class="fas fa-save"></i> Enregistrer les modifications
                        </button>
                        <a href="{% url 'dashboard:shipping_zones' %}" class="btn-form btn-cancel">
                            Annuler
                        </a>
                    </div>
                </form>
            </div>

        </div>
    </main>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        const dropdown = document.getElementById("userDropdown");
        const menu = dropdown.querySelector(".dropdown-menu-custom");

        dropdown.addEventListener("click", function(e) {
            e.stopPropagation();
            menu.style.display = menu.style.display === "block" ? "none" : "block";
        });

        document.addEventListener("click", function() {
            menu.style.display = "none";
        });
    });
</script>

</body>
</html>
