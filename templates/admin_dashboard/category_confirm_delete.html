{% extends "base_admin.html" %}

{% block content %}
<div class="card" style="text-align: center; padding: 50px;">
    <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #c0392b; margin-bottom: 20px;"></i>
    <h2>Confirmer la suppression ?</h2>
    <p style="margin-bottom: 30px; color: #555;">
        Êtes-vous sûr de vouloir supprimer la catégorie <strong>{{ object.name }}</strong> ?
        <br>Cette action est irréversible.
    </p>

    <form method="post">
        {% csrf_token %}
        <a href="{% url 'products:category_list' %}" class="btn btn-outline">Annuler</a>
        <button type="submit" class="btn" style="background: #c0392b; color: white; padding: 10px 30px; border-radius: 50px; margin-left: 10px; border: none; cursor: pointer;">Supprimer</button>
    </form>
</div>
{% endblock %}
