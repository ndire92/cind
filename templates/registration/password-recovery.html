<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié | Terra & Pure</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary-color: #557C55; --bg-color: #FAF9F6; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); color: #333; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .card {
            background: white; padding: 40px; border-radius: 12px;
            width: 100%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center;
        }
        .icon-circle {
            width: 70px; height: 70px; background: #f0f7f0; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
        }
        .icon-circle i { font-size: 2rem; color: var(--primary-color); }
        
        h2 { font-family: 'Playfair Display', serif; margin-bottom: 10px; }
        p { font-size: 0.9rem; color: #666; margin-bottom: 25px; line-height: 1.5; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.85rem; margin-bottom: 5px; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        input:focus { border-color: var(--primary-color); }
        
        .btn { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; }
        .btn:hover { opacity: 0.9; }
        
        .back-link { display: block; margin-top: 20px; font-size: 0.9rem; color: #999; }
        .back-link:hover { color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-circle">
            <i class="fas fa-key"></i>
        </div>
        <h2>Mot de passe oublié ?</h2>
        <p>Entrez l'adresse email associée à votre compte et nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>
        
        <form onsubmit="event.preventDefault(); this.style.display='none'; document.getElementById('success-msg').style.display='block';">
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="votre@email.com" required>
            </div>
            <button type="submit" class="btn">Envoyer le lien</button>
        </form>

        <div id="success-msg" style="display: none; text-align: center; padding: 20px 0;">
            <i class="fas fa-check-circle" style="color: #27ae60; font-size: 2rem; margin-bottom: 15px;"></i>
            <h3>Email envoyé !</h3>
            <p>Vérifiez votre boîte de réception pour suivre les instructions.</p>
        </div>

        <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Retour à la connexion</a>
    </div>

</body>
</html>
